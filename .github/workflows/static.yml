<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CaRPG - Gameplay Guide</title>
    <style>
      :root {
        --bg: #0d1220;
        --panel: #151d33;
        --text: #e8eefc;
        --muted: #aeb9d6;
        --accent: #5bd4ff;
        --good: #8df0a6;
        --warn: #ffd37a;
        --border: #2a385f;
      }

      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: radial-gradient(circle at top, #192549 0%, var(--bg) 60%);
        color: var(--text);
        line-height: 1.5;
      }
      .wrap {
        width: min(1000px, 94vw);
        margin: 24px auto 40px;
      }
      .hero, .card {
        background: color-mix(in srgb, var(--panel) 90%, black);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 18px 20px;
        margin-bottom: 14px;
      }
      h1, h2, h3 {
        margin: 0 0 8px;
        line-height: 1.2;
      }
      h1 { font-size: 2rem; }
      h2 { font-size: 1.25rem; margin-top: 8px; }
      p { margin: 8px 0; color: var(--muted); }
      ul { margin: 8px 0 0 18px; color: var(--muted); }
      li { margin: 4px 0; }
      .kpi {
        display: inline-block;
        margin-right: 8px;
        padding: 5px 10px;
        border: 1px solid var(--border);
        border-radius: 999px;
        font-size: 0.9rem;
        color: var(--text);
      }
      .accent { color: var(--accent); }
      .good { color: var(--good); }
      .warn { color: var(--warn); }
      code {
        background: #0f1730;
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 2px 6px;
        color: #e7f2ff;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 8px;
      }
      th, td {
        border: 1px solid var(--border);
        padding: 8px;
        text-align: left;
        vertical-align: top;
      }
      th {
        background: #1a2545;
        color: #dce8ff;
      }
      .small { font-size: 0.92rem; color: var(--muted); }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="hero">
        <h1>CaRPG Gameplay Guide</h1>
        <p>
          You are the car. Build your profile from a rookie street racer into a high-end machine by
          winning races, leveling up, unlocking areas, and upgrading your setup.
        </p>
        <span class="kpi">Race</span>
        <span class="kpi">Level Up</span>
        <span class="kpi">Equip</span>
        <span class="kpi">Unlock Areas</span>
        <span class="kpi">Manage Rivalry</span>
      </section>

      <section class="card">
        <h2>Controls</h2>
        <ul>
          <li><span class="accent">Drive:</span> <code>Arrow Keys</code> or <code>WASD</code></li>
          <li><span class="accent">Drive (Controller):</span> <code>Left Stick</code> or <code>D-pad</code></li>
          <li><span class="accent">Start race near rival:</span> <code>Space</code> or <code>Enter</code></li>
          <li><span class="accent">Start race (Controller):</span> south face button (<code>A</code> on Xbox, <code>Cross</code> on PlayStation)</li>
          <li><span class="accent">UI buttons:</span> Equipment, car buying, profile save/load controls in HUD</li>
        </ul>
      </section>

      <section class="card">
        <h2>Core Progression Loop</h2>
        <ol class="small">
          <li>Find nearby active rivals and challenge them.</li>
          <li>Win races for money, XP, and reputation.</li>
          <li>Level up your car to unlock tougher areas and more racers.</li>
          <li>Buy/equip better engine and tire gear to improve stats.</li>
          <li>Purchase new car models when you can afford them.</li>
        </ol>
      </section>

      <section class="card">
        <h2>Stats and What They Do</h2>
        <table>
          <thead>
            <tr>
              <th>Stat</th>
              <th>Effect</th>
              <th>Improved By</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>Top Speed</td>
              <td>Maximum speed while accelerating</td>
              <td>Car model, engine equipment, level bonuses</td>
            </tr>
            <tr>
              <td>Acceleration</td>
              <td>How quickly your car reaches speed</td>
              <td>Car model, engine equipment, level bonuses</td>
            </tr>
            <tr>
              <td>Handling</td>
              <td>How sharply and smoothly your car turns</td>
              <td>Car model, tire equipment, level bonuses</td>
            </tr>
          </tbody>
        </table>
      </section>

      <section class="card">
        <h2>Equipment and Upgrades</h2>
        <p>Equipment works in tiers. Buying a tier unlocks it permanently for that profile slot.</p>
        <h3>Engine Equipment</h3>
        <ul>
          <li><code>Stock Engine</code> (baseline)</li>
          <li><code>Street Intake</code> - early speed/accel jump</li>
          <li><code>Turbo Kit</code> - strong mid-game power</li>
          <li><code>Race ECU</code> - high-end performance</li>
        </ul>
        <h3>Tire Equipment</h3>
        <ul>
          <li><code>Stock Tires</code> (baseline)</li>
          <li><code>Sport Tires</code> - better cornering</li>
          <li><code>Grip Compound</code> - major handling boost</li>
          <li><code>Track Slicks</code> - top handling tier</li>
        </ul>
      </section>

      <section class="card">
        <h2>Areas and Unlocks</h2>
        <p>As your car level increases, more areas and racers become active.</p>
        <ul>
          <li><span class="good">Level 1:</span> Downtown</li>
          <li><span class="good">Level 3:</span> Industrial</li>
          <li><span class="good">Level 5:</span> Hills</li>
          <li><span class="good">Level 8:</span> Neon Harbor</li>
        </ul>
      </section>

      <section class="card">
        <h2>Rival System: Vex</h2>
        <p>
          <code>Vex</code> is your arch-rival. The more times you race him, the more often he appears nearby
          to force challenges. Racing Vex also increases stakes and rewards.
        </p>
        <p class="small">
          Tip: If your build is weak, avoid forced Vex engagements until you can equip better engine and tire tiers.
        </p>
      </section>

      <section class="card">
        <h2>Profile Save/Load Guide</h2>
        <ul>
          <li><code>Save Now</code>: manual save for the active profile slot</li>
          <li><code>Load</code>: load selected slot immediately</li>
          <li><code>New Profile</code>: reset selected slot to fresh start</li>
          <li><code>&lt; Slot</code> / <code>Slot &gt;</code>: switch between profile slots 1-3</li>
        </ul>
        <p class="small">
          The game also auto-saves periodically and on major progression events.
        </p>
      </section>

      <section class="card">
        <h2>Early-Game Tips</h2>
        <ul>
          <li>Prioritize one engine upgrade first for easier race wins.</li>
          <li>Then buy a tire upgrade to avoid losing speed in turns.</li>
          <li>Use manual <code>Save Now</code> before big purchase decisions.</li>
          <li>Push to level 3 quickly to unlock more rivals and better income opportunities.</li>
        </ul>
      </section>
    </main>
  </body>
</html>
